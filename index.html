<!DOCTYPE html>
<!--
  A.R.I. — Audiological Roaming Intelligence
  An unofficial fan tribute inspired by ARIatHOME (NYC street musician & streamer).
  Not affiliated with or endorsed by ARIatHOME. All music is generated in the
  browser with the Web Audio API; no samples or recordings are used.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#04050a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A.R.I.">
<title>A.R.I. — Audiological Roaming Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#030409;
    --cyan:#3ee8de;
    --cyan-dim:#1f8f8a;
    --purple:#a78bff;
    --purple-dim:#5e50a8;
    --lav:#b9a8ff;
    --magenta:#ff5fd2;
    --orange:#3ee8de;       /* folded back into the cyan/purple palette */
    --orange-dim:#1f8f8a;
    --key:#eef6f6;
    --key-dim:#7e9496;
    --blue:#a78bff;         /* speakers/details now read as purple, not extra blue */
    --faint:#111722;
    --muted:#3a4456;
    --nyc-green:#007A3D;
    --nyc-green-dim:#2fa66f;
    --text:#dfeef0;
    --support:#aab6bd;
    --glow1:rgba(62,232,222,.45);
    --glow2:rgba(120,90,255,.14);
    --btng:rgba(62,232,222,.25);
  }
  body.light{
    --bg:#f2f4f6;
    --cyan:#0b9c93;
    --cyan-dim:#7fb0ac;
    --purple:#7452e8;
    --purple-dim:#a795e0;
    --lav:#7452e8;
    --magenta:#d61e9e;
    --orange:#0b9c93;
    --orange-dim:#7fb0ac;
    --key:#26313c;
    --key-dim:#93a0a6;
    --blue:#7452e8;
    --faint:#d9dee6;
    --muted:#8b94a3;
    --nyc-green:#007A3D;
    --nyc-green-dim:#0a6d40;
    --text:#16202a;
    --support:#5c6672;
    --glow1:rgba(11,156,147,.20);
    --glow2:rgba(116,82,232,.08);
    --btng:rgba(11,156,147,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%; background:var(--bg)}
  body{
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  #stage{
    position:fixed; top:0; left:0; right:0;
    height:100vh; height:100svh;
    background:var(--bg);
    transition:background .4s ease;
    display:flex;align-items:center;justify-content:center;
    padding-top:48px;
    cursor:pointer;
  }
  svg#scene{
    width:min(92vw,86vh);
    height:min(92vw,86vh);
    filter:drop-shadow(0 0 6px var(--glow1)) drop-shadow(0 0 26px var(--glow2));
  }
  svg *{vector-effect:non-scaling-stroke}
  .c {stroke:var(--cyan);   fill:none; stroke-width:1.5; stroke-linejoin:round; stroke-linecap:round}
  .cd{stroke:var(--cyan-dim);fill:none; stroke-width:1.3; stroke-linejoin:round; stroke-linecap:round}
  .p {stroke:var(--purple); fill:none; stroke-width:1.5; stroke-linejoin:round; stroke-linecap:round}
  .pd{stroke:var(--purple-dim); fill:none; stroke-width:1.3; stroke-linejoin:round; stroke-linecap:round}
  .o {stroke:var(--orange); fill:none; stroke-width:1.6; stroke-linejoin:round; stroke-linecap:round}
  .od{stroke:var(--orange-dim); fill:none; stroke-width:1.3; stroke-linejoin:round; stroke-linecap:round}
  .w {stroke:var(--key);    fill:none; stroke-width:1.4; stroke-linejoin:round; stroke-linecap:round}
  .wd{stroke:var(--key-dim);fill:none; stroke-width:1.2; stroke-linejoin:round; stroke-linecap:round}
  .b {stroke:var(--blue);   fill:none; stroke-width:1.5; stroke-linejoin:round; stroke-linecap:round}
  .wtxt{font-family:'IBM Plex Mono',monospace; font-size:4.2px; fill:var(--key-dim); stroke:none}
  .key{fill:transparent; transition:fill .22s}
  .key.on{fill:var(--key); fill-opacity:.4; transition:fill .05s}
  .rec{fill:var(--magenta); stroke:none; animation:recblink 1s steps(1) infinite}
  .sgn{stroke:var(--muted); fill:none; stroke-width:1.1; stroke-linejoin:round; stroke-linecap:round}
  .signblade{stroke:var(--nyc-green); fill:none; stroke-width:1.35; stroke-linejoin:round; stroke-linecap:round}
  .signmark{stroke:var(--nyc-green-dim); fill:none; stroke-width:1.05; stroke-linejoin:round; stroke-linecap:round; opacity:.75}
  .bg {stroke:var(--muted); fill:none; stroke-width:1;   stroke-linejoin:round; stroke-linecap:round}
  .sgntxt{font-family:'IBM Plex Mono',monospace; font-size:9px; fill:var(--nyc-green-dim); stroke:none; letter-spacing:.12em; opacity:.9}
  #gSign{opacity:0; transition:opacity 1.6s ease}
  #gSign.here{opacity:.8}
  .rectxt{font-family:'IBM Plex Mono',monospace; font-size:5.5px; fill:var(--magenta); stroke:none; letter-spacing:.1em}
  @keyframes recblink{50%{opacity:0}}
  .l {stroke:var(--lav);    fill:none; stroke-width:1.4; stroke-linejoin:round; stroke-linecap:round}
  .m {stroke:var(--magenta);fill:none; stroke-width:1.5; stroke-linejoin:round; stroke-linecap:round}
  .v {stroke:currentColor;  fill:none; stroke-width:1.5; stroke-linejoin:round; stroke-linecap:round}
  .vc{stroke:currentColor;  fill:none; stroke-width:1;   stroke-linejoin:round; stroke-linecap:round; opacity:.85}
  .g {stroke:url(#grad);    fill:none; stroke-width:1.6; stroke-linejoin:round; stroke-linecap:round}
  .f {stroke:var(--faint);  fill:none; stroke-width:1.2}
  .pad{fill:rgba(167,139,255,0); transition:fill .35s}
  #gVisitor,#gVisitor2{opacity:0; transition:opacity 1.4s ease}
  #gVisitor.here,#gVisitor2.here{opacity:1}
  #gArmL,#gArmLup{transition:opacity .6s ease}
  .note{font-family:'IBM Plex Mono',monospace; font-size:15px; fill:var(--magenta); opacity:0;}
  .note.sp{fill:var(--lav); font-size:13px}
  @keyframes noteRise{
    0%{opacity:0; transform:translateY(4px)}
    15%{opacity:.95}
    100%{opacity:0; transform:translateY(-42px)}
  }
  .note.go{animation:noteRise 2.2s ease-out forwards}

  /* ---------- UI ---------- */
  header{position:fixed; top:26px; left:30px; pointer-events:none; z-index:5}
  header h1{
    font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:clamp(26px,3.4vw,40px); letter-spacing:.14em; color:var(--text);
    text-shadow:0 0 14px var(--glow1);
  }
  header p{
    margin-top:4px; font-size:10px; letter-spacing:.32em; color:var(--cyan-dim);
  }
  header .tribute{
    margin-top:10px; font-size:9px; letter-spacing:.12em; color:var(--support);
    text-transform:none; max-width:78vw;
  }
  #hint{
    position:fixed; left:50%; bottom:11%; transform:translateX(-50%);
    font-size:11px; letter-spacing:.3em; color:var(--cyan-dim);
    animation:pulse 2.6s ease-in-out infinite; z-index:5; pointer-events:none;
    text-transform:uppercase; white-space:nowrap;
  }
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  #trackinfo{
    position:fixed; left:30px; bottom:30px; z-index:5; pointer-events:none;
    font-size:11px; letter-spacing:.18em; line-height:1.9; text-transform:uppercase;
    opacity:0; transform:translateY(10px);
    transition:opacity .9s ease, transform .9s ease;
  }
  #trackinfo.show{opacity:1; transform:none}
  #tiRow{display:flex; align-items:center; gap:12px; pointer-events:none}
  #albumArt{
    width:56px; height:56px; flex-shrink:0; border-radius:3px;
    background:#030409; border:1px solid var(--cyan-dim);
    box-shadow:0 0 16px var(--glow2); object-fit:cover;
  }
  #tiText{display:flex; flex-direction:column}
  #trackname{color:var(--text); font-size:13px; letter-spacing:.22em}
  #trackmeta{color:var(--cyan-dim)}
  #visitorline{color:var(--magenta); opacity:0; transition:opacity .9s}
  #visitorline.on{opacity:1}
  #cypherline{
    color:var(--lav); opacity:0; transition:opacity .9s;
    letter-spacing:.28em; font-size:10px; text-shadow:0 0 10px var(--glow2);
    height:0; overflow:hidden;
  }
  #cypherline.on{opacity:.95; height:auto}
  #liveRecording{
    position:fixed; left:50%; top:calc(env(safe-area-inset-top, 0px) + 82px);
    transform:translate(-50%,-8px); z-index:8; pointer-events:none;
    display:flex; align-items:center; gap:clamp(10px,2.4vw,20px);
    opacity:0; transition:opacity .28s ease, transform .28s ease;
    font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:clamp(28px,8.5vw,76px); line-height:1; letter-spacing:.12em;
    color:#f4f7f7; text-shadow:0 0 12px rgba(255,42,54,.55),0 0 28px rgba(62,232,222,.18);
    white-space:nowrap; text-transform:uppercase;
  }
  #liveRecording.on{opacity:1; transform:translate(-50%,0)}
  #liveRecording .dot{
    width:clamp(13px,3.8vw,30px); height:clamp(13px,3.8vw,30px); border-radius:50%;
    background:#ff2638; box-shadow:0 0 14px rgba(255,38,56,.95),0 0 32px rgba(255,38,56,.45);
    animation:liveblink .82s steps(1) infinite; flex:0 0 auto;
  }
  @keyframes liveblink{50%{opacity:.18}}
  #playbtn{
    position:fixed; left:30px; bottom:136px; z-index:6;
    width:54px; height:54px; border-radius:50%;
    border:1.5px solid var(--cyan); background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 14px var(--btng), inset 0 0 10px var(--btng);
    opacity:0; transform:translateY(10px);
    transition:opacity .8s ease, transform .8s ease, box-shadow .3s;
  }
  #playbtn.show{opacity:1; transform:none}
  #playbtn:hover{box-shadow:0 0 22px var(--btng), inset 0 0 12px var(--btng)}
  #playbtn.show:active{transform:scale(.94)}
  #playbtn:focus-visible{outline:2px solid var(--purple); outline-offset:4px}
  #playbtn svg{width:18px;height:18px;stroke:var(--cyan);fill:none;stroke-width:1.8;stroke-linejoin:round}
  footer{
    position:fixed; right:30px; top:32px; z-index:5;
    display:flex; align-items:center; gap:10px; justify-content:flex-end;
    font-size:9px; letter-spacing:.26em; color:var(--support); text-transform:uppercase;
    pointer-events:none;
  }
  #themebtn{
    pointer-events:auto;
    width:20px; height:20px; border-radius:50%;
    border:1.5px solid var(--cyan-dim); background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:border-color .3s, transform .15s;
  }
  #themebtn:hover{border-color:var(--cyan)}
  #themebtn:active{transform:scale(.92)}
  #themebtn:focus-visible{outline:2px solid var(--purple); outline-offset:4px}
  #themebtn svg{width:11px;height:11px;stroke:var(--cyan-dim);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  #themebtn.auto svg path.fillhalf{fill:var(--cyan-dim); stroke:none}
  @media (max-width:640px){
    header{left:18px; top:18px}
    #trackinfo{left:18px; bottom:18px; font-size:10px}
    #albumArt{width:44px; height:44px}
    #playbtn{left:18px; bottom:118px}
    footer{right:18px; top:20px}
    #themebtn{width:18px; height:18px}
      #stage{padding-top:60px}
    svg#scene{width:104vw; height:104vw}
  }
  @media (prefers-reduced-motion:reduce){
    #hint{animation:none; opacity:.7}
    .note.go{animation-duration:.01s}
  }
</style>
</head>
<body>
<div id="stage">
  <svg id="scene" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ff5fd2"/>
        <stop offset="1" stop-color="#3ee8de"/>
      </linearGradient>
    </defs>
    <g id="world"></g>
    <g id="gReverse" style="display:none"></g>
  </svg>
</div>

<header>
  <h1>A.R.I.</h1>
  <p>AUDIOLOGICAL&nbsp;ROAMING&nbsp;INTELLIGENCE</p>
  <p class="tribute">fan-made tribute · inspired by street performances, walking sound systems and ARIatHOME · version 7</p>
</header>

<footer>
  <span>live from the grid</span>
  <button id="themebtn" aria-label="cycle theme: auto, light, dark">
    <svg viewBox="0 0 24 24"><g id="thicon"></g></svg>
  </button>
</footer>

<div id="hint">tap A.R.I. to catch the street signal</div>

<div id="trackinfo" style="display:none">
  <div id="tiRow">
    <img id="albumArt" alt="" width="56" height="56">
    <div id="tiText">
      <div id="trackname"></div>
      <div id="trackmeta"></div>
    </div>
  </div>
  <div id="visitorline"></div>
  <div id="cypherline">A cypher is forming</div>
</div>

<div id="liveRecording" aria-hidden="true"><span class="dot"></span><span>LIVE RECORDING</span></div>

<button id="playbtn" style="display:none" aria-label="play or pause">
  <svg viewBox="0 0 24 24"><path id="pbicon" d="M8 5 L18 12 L8 19 Z"/></svg>
</button>

<script>
/* ============================================================
   ISOMETRIC SCENE — simple neon line art
   ============================================================ */
const S=34, IA=Math.cos(Math.PI/6)*S, IB=Math.sin(Math.PI/6)*S;
const iso=(x,y,z)=>[(x-y)*IA, (x+y)*IB - z*S];
const pt=(x,y,z)=>{const p=iso(x,y,z);return p[0].toFixed(1)+','+p[1].toFixed(1);};
const P=a=>a.map(q=>pt(...q)).join(' ');
const poly=(a,cls,extra='')=>`<polygon class="${cls}" points="${P(a)}" ${extra}/>`;
const pline=(a,cls)=>`<polyline class="${cls}" points="${P(a)}"/>`;
const seg=(a,b,cls)=>`<line class="${cls}" x1="${iso(...a)[0].toFixed(1)}" y1="${iso(...a)[1].toFixed(1)}" x2="${iso(...b)[0].toFixed(1)}" y2="${iso(...b)[1].toFixed(1)}"/>`;

// circle lying flat on a horizontal plane (z const)
function circTop(cx,cy,z,r,cls,n=26){
  const a=[];for(let i=0;i<n;i++){const t=i/n*Math.PI*2;a.push([cx+r*Math.cos(t),cy+r*Math.sin(t),z]);}
  return poly(a,cls);
}
// circle on a vertical plane facing +x (x const)
function circX(x,cy,cz,r,cls,n=26){
  const a=[];for(let i=0;i<n;i++){const t=i/n*Math.PI*2;a.push([x,cy+r*Math.cos(t),cz+r*Math.sin(t)]);}
  return poly(a,cls);
}
// circle on a vertical plane facing +y (y const)
function circY(y,cx,cz,r,cls,n=26){
  const a=[];for(let i=0;i<n;i++){const t=i/n*Math.PI*2;a.push([cx+r*Math.cos(t),y,cz+r*Math.sin(t)]);}
  return poly(a,cls);
}
// wireframe box: top face + the two viewer-facing faces
function box(x1,y1,z1,x2,y2,z2,cls){
  return poly([[x1,y1,z2],[x2,y1,z2],[x2,y2,z2],[x1,y2,z2]],cls)
       + poly([[x2,y1,z2],[x2,y2,z2],[x2,y2,z1],[x2,y1,z1]],cls)
       + poly([[x1,y2,z2],[x2,y2,z2],[x2,y2,z1],[x1,y2,z1]],cls);
}
const bez=(a,c,b,cls)=>`<path class="${cls}" d="M ${pt(...a)} Q ${pt(...c)} ${pt(...b)}"/>`;
// coiled cable between two 3D points, drawn in screen space with sag
function coil(a,b,loops,r,sag,cls){
  const A=iso(...a), B=iso(...b);
  const n=loops*24;
  let d='M '+A[0].toFixed(1)+' '+A[1].toFixed(1);
  for(let i=1;i<=n;i++){
    const t=i/n, sh=Math.sin(Math.PI*t);          // loops shrink at both ends
    const x=A[0]+(B[0]-A[0])*t + Math.cos(t*Math.PI*2*loops)*r*sh;
    const y=A[1]+(B[1]-A[1])*t + Math.sin(t*Math.PI*2*loops)*r*sh + sh*sag;
    d+=' L '+x.toFixed(1)+' '+y.toFixed(1);
  }
  return `<path class="${cls}" fill="none" d="${d}"/>`;
}

const ZT=4.4;               // rig top height (hip level, like the real rig)
let s='';

/* ---------- street sign: behind the crew, fades in on a new block ---------- */
s+='<g id="gSign">';
s+=seg([0.5,-4.6,-2.0],[0.5,-4.6,11.2],'sgn');                                     // pole
s+=circTop(0.5,-4.6,11.2,.12,'sgn');                                               // cap
s+='<g id="gSignBlades"></g>';                                                     // blades: count + layout varied in JS per block
s+='</g>';
s+='<g id="gAri">';
/* ---------- backpack + speakers (behind robot) ---------- */
s+='<g class="gPack">';
s+=box(5.9,-3.3,3.6, 8.3,-2.35,6.7,'p');

// simplified backpack speakers — two larger pods under the pack; recognizable over literal
s+=box(5.05,-3.15,3.35, 5.85,-2.45,4.55,'b');          // lower left speaker
s+=circX(5.05,-2.8,3.95,.36,'b')+circX(5.05,-2.8,3.95,.13,'b');
s+=box(8.35,-3.15,3.35, 9.15,-2.45,4.55,'b');          // lower right speaker
s+=circX(9.15,-2.8,3.95,.36,'b')+circX(9.15,-2.8,3.95,.13,'b');

s+='<g id="sfxC" opacity="0"></g><g id="sfxD" opacity="0">'; // keep only lower speaker pulses
s+=seg([4.6,-2.8,3.95],[4.15,-2.8,3.95],'l');
s+=seg([4.65,-2.8,4.35],[4.3,-2.8,4.65],'l');
s+=seg([4.65,-2.8,3.55],[4.3,-2.8,3.25],'l');
s+=seg([9.6,-2.8,3.95],[10.05,-2.8,3.95],'l');
s+=seg([9.55,-2.8,4.35],[9.9,-2.8,4.65],'l');
s+=seg([9.55,-2.8,3.55],[9.9,-2.8,3.25],'l');
s+='</g>';

s+=bez([5.85,-2.55,4.45],[5.55,-2.0,5.3],[6.1,-2.35,6.75],'cd'); // left cable
s+=bez([8.35,-2.55,4.45],[8.75,-2.0,5.3],[8.1,-2.35,6.75],'cd'); // right cable
s+=seg([5.95,-2.65,6.75],[8.25,-2.65,6.75],'pd');      // top speaker rail
s+='</g>';

/* ---------- robot body ---------- */
s+=seg([5.9,-1.35,3.05],[7.0,-1.35,3.05],'cd');        // hinge axles: legs pivot on these
s+=seg([7.2,-1.35,3.05],[8.3,-1.35,3.05],'cd');
s+='<g id="alegA"></g><g id="alegB"></g>';
s+=box(5.8,-2.0,3.1, 8.4,-0.8,3.9,'c');                // hips
s+=box(5.5,-2.2,4.0, 8.7,-0.7,6.9,'c');                // torso
s+=box(6.7,-1.8,6.9, 7.5,-1.1,7.35,'c');               // neck
s+=seg([5.6,-0.75,5.6],[8.6,-0.75,5.6],'cd');          // chest seam

/* ---------- head (own group: bobs to the kick) ---------- */
s+='<g id="gHead">';
s+=box(5.9,-2.3,7.45, 8.3,-0.6,9.55,'c');
s+=poly([[6.15,-0.58,7.72],[8.05,-0.58,7.72],[8.05,-0.58,9.28],[6.15,-0.58,9.28]],'g'); // faceplate
s+=bez([6.42,-0.56,8.42],[6.68,-0.56,8.78],[6.94,-0.56,8.42],'g');  // happy eye L
s+=bez([7.26,-0.56,8.42],[7.52,-0.56,8.78],[7.78,-0.56,8.42],'g');  // happy eye R
// headphones
s+=circX(5.82,-1.45,8.5,.78,'p')+circX(5.82,-1.45,8.5,.42,'pd');
s+=circX(8.38,-1.45,8.5,.78,'p')+circX(8.38,-1.45,8.5,.42,'pd');
s+=bez([5.82,-1.45,9.0],[7.1,-1.45,10.55],[8.38,-1.45,9.0],'p');
s+=bez([5.98,-1.45,9.05],[7.1,-1.45,10.3],[8.22,-1.45,9.05],'pd');
s+=bez([8.35,-1.05,8.15],[8.15,-0.5,7.85],[7.62,-0.58,7.98],'p');   // headset mic boom
s+=circY(-0.56,7.55,7.98,.1,'p');                                    // mic tip
s+='</g>';

/* ---------- straps ---------- */
s+=seg([6.3,-2.2,6.85],[6.15,-0.85,4.4],'cd');
s+=seg([7.9,-2.2,6.85],[8.05,-0.85,4.4],'cd');

/* ---------- wearable rig: mounted to the harness ---------- */
s+=seg([5.75,-0.7,5.3],[5.75,-0.02,4.38],'od');        // harness rods
s+=seg([8.45,-0.7,5.3],[8.45,-0.02,4.38],'od');
s+=box(5.6,-0.72,5.15, 5.9,-0.55,5.45,'od');           // mounting brackets
s+=box(8.3,-0.72,5.15, 8.6,-0.55,5.45,'od');
s+=box(1.2,0,4.05, 12.8,2.4,ZT,'o');                    // rig top
s+=box(3.1,1.6,3.05, 4.1,2.4,4.05,'b');                // under-rig speaker L
s+=circY(2.4,3.6,3.55,.3,'b');
s+=box(9.5,1.6,3.05, 10.5,2.4,4.05,'b');               // under-rig speaker R
s+=circY(2.4,10.0,3.55,.3,'b');
s+='<g id="sfxA" opacity="0">';                        // sound dashes L
s+=seg([3.6,3.1,3.55],[3.6,3.55,3.55],'l');
s+=seg([3.6,3.05,3.95],[3.6,3.35,4.25],'l');
s+=seg([3.6,3.05,3.15],[3.6,3.35,2.85],'l');
s+='</g><g id="sfxB" opacity="0">';                    // sound dashes R
s+=seg([10.0,3.1,3.55],[10.0,3.55,3.55],'l');
s+=seg([10.0,3.05,3.95],[10.0,3.35,4.25],'l');
s+=seg([10.0,3.05,3.15],[10.0,3.35,2.85],'l');
s+='</g>';

/* ---------- deck: jog wheel + pads ---------- */
s+='<g id="gWheel">';
s+=circTop(3.3,1.2,ZT+0.02,1.0,'w');
s+=circTop(3.3,1.2,ZT+0.02,0.5,'wd');
s+='<g id="gWheelSpin">';
for(let k=0;k<12;k++){                                   // grooves
  const a=k/12*Math.PI*2;
  s+=seg([3.3+Math.cos(a)*0.58,1.2+Math.sin(a)*0.58,ZT+0.02],
         [3.3+Math.cos(a)*0.92,1.2+Math.sin(a)*0.92,ZT+0.02],'wd');
}
'A.R.I.'.split('').forEach((ch,i)=>{                     // minuscule label on the disc
  const a=(-0.62+i*0.25);
  const [tx,ty]=iso(3.3+Math.cos(a)*0.66,1.2+Math.sin(a)*0.66,ZT+0.02);
  s+=`<text class="wtxt" x="${tx.toFixed(1)}" y="${ty.toFixed(1)}" text-anchor="middle">${ch}</text>`;
});
s+=circTop(3.3+0.4,1.2,ZT+0.02,0.06,'w');                // marker dot
s+='</g>';
s+=circTop(3.3,1.2,ZT+0.02,0.13,'w');
s+='</g>';
let padId=0;
for(let j=0;j<3;j++)for(let i=0;i<4;i++){
  const x0=5.0+i*0.62, y0=0.35+j*0.6, w=0.46;
  s+=poly([[x0,y0,ZT+0.02],[x0+w,y0,ZT+0.02],[x0+w,y0+w,ZT+0.02],[x0,y0+w,ZT+0.02]],'wd pad',`id="pad${padId++}"`);
}

/* ---------- keyboard panel + keys + faders ---------- */
s+=box(8.1,0.3,ZT, 12.4,2.15,ZT+0.3,'o');
for(let i=0;i<9;i++){
  const x0=8.45+i*0.44;
  s+=poly([[x0,1.25,ZT+0.32],[x0+0.36,1.25,ZT+0.32],[x0+0.36,2.0,ZT+0.32],[x0,2.0,ZT+0.32]],'w key',`id="key${i}"`);
}
let faderSvg='';
for(let i=0;i<8;i++){
  const x=8.6+i*0.52;
  faderSvg+=seg([x,0.5,ZT+0.32],[x,1.1,ZT+0.32],'od');
  faderSvg+=`<g id="fader${i}">`+poly([[x-0.13,0.72,ZT+0.33],[x+0.13,0.72,ZT+0.33],[x+0.13,0.94,ZT+0.33],[x-0.13,0.94,ZT+0.33]],'l')+`</g>`;
}
s+=faderSvg;

/* ---------- corner monitor ---------- */
s+=box(7.0,1.75,ZT, 7.6,2.35,ZT+0.4,'o');
s+=seg([7.3,2.05,ZT+0.4],[7.3,2.05,ZT+1.75],'o');
s+=circTop(7.3,2.05,ZT+1.2,.18,'od');
s+=poly([[6.0,2.05,ZT+1.45],[8.75,2.05,ZT+1.45],[8.75,2.05,ZT+3.2],[6.0,2.05,ZT+3.2]],'o');
s+=poly([[6.15,2.05,ZT+1.6],[8.6,2.05,ZT+1.6],[8.6,2.05,ZT+3.05],[6.15,2.05,ZT+3.05]],'od');
let eqSvg='';
for(let i=0;i<7;i++){
  const x=6.38+i*0.31;
  const [x1,y1]=iso(x,2.05,ZT+1.72), [x2,y2]=iso(x,2.05,ZT+2.0);
  eqSvg+=`<line id="eq${i}" class="l" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
}
s+=eqSvg;

/* ---------- arms (drawn over the table) ---------- */
// robot's right arm (viewer left) -> jog wheel
s+='<g id="gArmL">';
s+=circX(5.42,-1.45,6.35,.36,'c');

function boxPolys3(x1,y1,z1,x2,y2,z2){
  return [
    [[x1,y1,z2],[x2,y1,z2],[x2,y2,z2],[x1,y2,z2]],
    [[x2,y1,z2],[x2,y2,z2],[x2,y2,z1],[x2,y1,z1]],
    [[x1,y2,z2],[x2,y2,z2],[x2,y2,z1],[x1,y2,z1]],
  ];
}
function buildAriLeg(gid, legBox, footBox){
  const g=document.getElementById(gid), polys=[];
  [...boxPolys3(...legBox),...boxPolys3(...footBox)].forEach(pts=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    el.setAttribute('class','c');
    el.setAttribute('points',pts.map(p=>pt(...p)).join(' '));
    g.appendChild(el); polys.push({el,pts});
  });
  return {g, axY:-1.35, axZ:3.05, polys};
}

function poseLeg(leg,theta,liftPx,bobPx){
  const c=Math.cos(theta), sn=Math.sin(theta);
  leg.polys.forEach(pp=>{
    const str=pp.pts.map(([x,y,z])=>{
      const dy=y-leg.axY, dz=z-leg.axZ;
      return pt(x, leg.axY+dy*c-dz*sn, leg.axZ+dy*sn+dz*c);
    }).join(' ');
    pp.el.setAttribute('points',str);
  });
  leg.g.setAttribute('transform',`translate(0 ${(bobPx-liftPx).toFixed(1)})`);
}

let reverb=null, revGain=null, duck=null, vinylGain=null;

function makeIR(sec,decay){                       // generated impulse response — no samples
  const len=Math.floor(ctx.sampleRate*sec);
  const b=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  return b;
}
function makeVinyl(){                             // sparse crackle loop
  const len=ctx.sampleRate*2, b=ctx.createBuffer(1,len,ctx.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<len;i++){
    d[i]=(Math.random()<0.0008)?(Math.random()*2-1)*R(0.3,1):0;   // pops
    d[i]+=(Math.random()*2-1)*0.012;                              // hiss bed
  }
  return b;
}
function initAudio(){
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  master=ctx.createGain(); master.gain.value=0.9;
  const sat=ctx.createWaveShaper();               // gentle tape-ish glue
  const curve=new Float32Array(512);
  for(let i=0;i<512;i++){const x=i/256-1; curve[i]=Math.tanh(x*1.4)/Math.tanh(1.4);}
  sat.curve=curve; sat.oversample='2x';
  const comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-16; comp.ratio.value=4;
  master.connect(sat); sat.connect(comp);
  // route the final mix through a hidden <audio> element instead of straight to
  // ctx.destination: iOS/Android only grant a page continued background execution
  // when a real HTMLMediaElement is audibly playing (a "now playing" session).
  // a bare AudioContext gets suspended the moment the app is backgrounded.
  if(ctx.createMediaStreamDestination){
    streamDest=ctx.createMediaStreamDestination();
    comp.connect(streamDest);
    bgAudioEl=document.createElement('audio');
    bgAudioEl.srcObject=streamDest.stream;
    bgAudioEl.autoplay=true;
    bgAudioEl.setAttribute('playsinline','');
    bgAudioEl.style.display='none';
    document.body.appendChild(bgAudioEl);
  }else{
    comp.connect(ctx.destination);                // very old browser: no background trick possible
  }
  duck=ctx.createGain(); duck.gain.value=1;       // sidechain bus: bass/harmony pump on the kick
  duck.connect(master);
  delayNode=ctx.createDelay(2.0);
  delayGain=ctx.createGain(); delayGain.gain.value=0.28;
  const dFilt=ctx.createBiquadFilter(); dFilt.type='lowpass'; dFilt.frequency.value=2600;
  delayNode.connect(dFilt); dFilt.connect(delayGain); delayGain.connect(master);
  delayGain.connect(delayNode); // feedback
  reverb=ctx.createConvolver(); reverb.buffer=makeIR(1.9,3.2);
  revGain=ctx.createGain(); revGain.gain.value=0.5;
  reverb.connect(revGain); revGain.connect(master);
  const vin=ctx.createBufferSource(); vin.buffer=makeVinyl(); vin.loop=true;
  const vf=ctx.createBiquadFilter(); vf.type='bandpass'; vf.frequency.value=3400; vf.Q.value=0.4;
  vinylGain=ctx.createGain(); vinylGain.gain.value=0;
  vin.connect(vf); vf.connect(vinylGain); vinylGain.connect(master); vin.start();
}
function duckDip(t){                              // classic pump, scaled to tempo
  if(!track||!track.g.duck) return;
  const rel=Math.min(0.34,(60/track.bpm)*0.62);
  duck.gain.cancelScheduledValues(t);
  duck.gain.setValueAtTime(1,t);
  duck.gain.linearRampToValueAtTime(0.38,t+0.012);
  duck.gain.linearRampToValueAtTime(1,t+rel);
}

function genPattern(base,cands,p){
  const a=new Array(16).fill(0);
  base.forEach(i=>a[i]=1);
  cands.forEach(i=>{if(Math.random()<p)a[i]=1;});
  return a;
}

/* ---------- generative album art: canvas-drawn per track, no images, no samples ----------
   Same neon palette as the SVG scene. Each genre gets its own abstract motif; root/bpm/
   trackNo seed the randomness so two tracks of the same genre never look identical. */
const artCanvas=document.createElement('canvas');
artCanvas.width=512; artCanvas.height=512;
const actx=artCanvas.getContext('2d');
const ART_CYAN='#3ee8de', ART_LAV='#b9a8ff', ART_MAG='#ff5fd2', ART_DIM='rgba(62,232,222,.32)';
function artGlow(color,width,blur){
  actx.strokeStyle=color; actx.lineWidth=width;
  actx.shadowColor=color; actx.shadowBlur=blur;
}
function drawAlbumArt(t){
  actx.shadowBlur=0;
  actx.fillStyle='#030409'; actx.fillRect(0,0,512,512);
  const seed=(t.root*37+t.bpm*7+trackNo*13)%360;
  actx.save(); actx.translate(256,256);
  if(t.genre==='boom bap'){                                   // tape reels over a dusty line grid
    artGlow(ART_DIM,1,3);
    for(let y=-224;y<=224;y+=26){actx.beginPath();actx.moveTo(-224,y);actx.lineTo(224,y);actx.stroke();}
    [-92,92].forEach(x=>{
      artGlow(ART_CYAN,3,16); actx.beginPath(); actx.arc(x,0,74,0,Math.PI*2); actx.stroke();
      artGlow(ART_LAV,2,10);  actx.beginPath(); actx.arc(x,0,24,0,Math.PI*2); actx.stroke();
    });
    artGlow(ART_CYAN,2,10); actx.beginPath(); actx.moveTo(-92,-74); actx.lineTo(92,-74); actx.stroke();
  }else if(t.genre==='trap'){                                 // jagged bolts radiating out
    const n=5+Math.floor((seed/360)*4);
    for(let i=0;i<n;i++){
      actx.save(); actx.rotate((seed*Math.PI/180)+i*(Math.PI*2/n));
      artGlow(i%2?ART_MAG:ART_LAV,3,20);
      actx.beginPath(); actx.moveTo(0,0);
      let x=0,y=0;
      for(let s=0;s<4;s++){x+=R(24,64)*(s%2?1:-1); y-=R(32,58); actx.lineTo(x,y);}
      actx.stroke(); actx.restore();
    }
  }else if(t.genre==='jerk'){                                 // bouncy cluster of circles
    for(let i=0;i<10;i++){
      const a=(i/10)*Math.PI*2+seed*0.017, r=R(60,196);
      artGlow(i%3===0?ART_MAG:(i%3===1?ART_CYAN:ART_LAV),2,14);
      actx.beginPath(); actx.arc(Math.cos(a)*r,Math.sin(a)*r,R(8,30),0,Math.PI*2); actx.stroke();
    }
  }else if(t.genre==='drum n bass'){                          // fast fragmented streaks
    for(let i=0;i<14;i++){
      const ang=R(0,Math.PI*2), len=R(90,230);
      artGlow(i%2?ART_CYAN:ART_LAV,1.5,10);
      actx.beginPath(); actx.moveTo(Math.cos(ang)*44,Math.sin(ang)*44);
      actx.lineTo(Math.cos(ang)*len,Math.sin(ang)*len); actx.stroke();
    }
  }else if(t.genre==='2000s rnb'){                            // soft concentric waves
    for(let i=0;i<6;i++){
      artGlow(i%2?ART_LAV:ART_CYAN,2,22);
      actx.beginPath(); actx.arc(0,0,42+i*32,seed*0.017+i,seed*0.017+i+Math.PI*1.4); actx.stroke();
    }
  }else{                                                      // house: pulsing concentric rings
    for(let i=0;i<6;i++){
      artGlow(i%2?ART_MAG:ART_CYAN,2,18);
      actx.beginPath(); actx.arc(0,0,30+i*34,0,Math.PI*2); actx.stroke();
    }
  }
  actx.restore(); actx.shadowBlur=0;
  artGlow('rgba(62,232,222,.5)',2,0);
  actx.strokeRect(8,8,496,496);
  return artCanvas.toDataURL('image/png');
}

function newTrack(forced){
  const genre=forced||pick(Object.keys(GENRES));
  const g=GENRES[genre];
  const bpm=RI(g.bpm[0],g.bpm[1]);
  const root=RI(43,55);
  const secs=R(62,176);
  const bars=Math.max(24,Math.round(secs*bpm/240));
  const prog=pick(g.progs||[[0,5],[0,3],[0,5,6,4],[0,2,5,4],[0,3,5,4],[0,6]]);
  /* song structure: intro → alternating verse/hook → outro, scaled to length */
  const sections=[]; let b0=0;
  const push=(name,len)=>{sections.push({name,start:b0,end:Math.min(bars,b0+len)}); b0=Math.min(bars,b0+len);};
  push('intro',4);
  let hook=false;
  while(b0<bars-4){ push(hook?'hook':'verse',8); hook=!hook; }
  if(b0<bars) push('outro',bars-b0);
  track={
    g, genre, bpm, root, bars, prog, sections,
    pad : Array.isArray(g.pad)?pick(g.pad):g.pad,
    kick : genPattern(g.kick.b,g.kick.c,g.kick.p),
    snare: genPattern(g.snare.b,g.snare.c,g.snare.p),
    hatP : R(g.hatP[0],g.hatP[1]),
    bassP: genPattern(g.bassPat.b,g.bassPat.c,g.bassPat.p),
    swing: R(g.swing[0],g.swing[1]),
    name : pick(NAME_A)+' '+pick(NAME_B),
    keyName: KEYS[root%12]+' minor',
    ariMicBar: Math.random()<0.14 ? RI(8, Math.min(bars-5, 26)) : -1,
    ariMicUsed: false,
    lastBassMidi: null,                      // for 808 glides
    arpOn: Math.random()<(g.arp||0),
  };
  if(delayNode) delayNode.delayTime.value=(60/bpm)*0.75;
  if(revGain) revGain.gain.value=g.rev!=null?g.rev*3:0.4;
  if(vinylGain) vinylGain.gain.setTargetAtTime(g.vinyl||0,ctx?ctx.currentTime:0,0.5);
  trackNo++;
  track.artURL=drawAlbumArt(track);
  const artEl=document.getElementById('albumArt');
  if(artEl) artEl.src=track.artURL;
  document.getElementById('trackname').textContent='track '+String(trackNo).padStart(3,'0')+' — “'+track.name+'”';
  updateMeta(0);
  updateMediaSession();
}
function sectAt(b){
  const s=track.sections.find(s=>b>=s.start&&b<s.end);
  return s||track.sections[track.sections.length-1];
}
function updateMeta(sec){
  const m=Math.floor(sec/60), ss=String(Math.floor(sec%60)).padStart(2,'0');
  const sn=(playing&&track.sections)?' · '+sectAt(bar).name:'';
  document.getElementById('trackmeta').textContent=`${track.genre} · ${track.keyName} · ${track.bpm} bpm${sn} · ${m}:${ss}`;
}

/* ---------- instruments ---------- */
function env(t,a,d,peak,g){
  g.gain.setValueAtTime(0.0001,t);
  g.gain.linearRampToValueAtTime(peak,t+a);
  g.gain.exponentialRampToValueAtTime(0.0001,t+a+d);
}
function playKick(t,vel){
  vel=vel==null?1:vel;
  const kd=track.g.kd, kit=track.g.kit;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.frequency.setValueAtTime(kd.f0*(kit==='808'?1.15:1),t);
  o.frequency.exponentialRampToValueAtTime(kd.f1,t+kd.d*0.55);
  env(t,0.002,kd.d*(kit==='808'?1.3:1),0.95*vel,g);
  if(kit==='808'||kit==='909'){                 // saturated thump + click transient
    const ws=ctx.createWaveShaper();
    const c=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i/128-1;c[i]=Math.tanh(x*2.4);}
    ws.curve=c;
    o.connect(g); g.connect(ws); ws.connect(master);

function playPluck(t,midi,dur){                 // Karplus-Strong: noise burst in a tuned feedback loop

      o.start(t); o.stop(t+dur+0.1); o2.start(t); o2.stop(t+dur+0.1);
    }else{
      const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=mtof(midi);
      const o2=ctx.createOscillator(); o2.type='triangle'; o2.frequency.value=mtof(midi+12);
      const g2=ctx.createGain(); g2.gain.value=0.09; o2.connect(g2); g2.connect(f);
      vib.frequency.value=5.1; vg.gain.value=10; vg.connect(o.detune); vg.connect(o2.detune);
      env(t,0.06,dur,0.24,g);
      o.connect(f); f.connect(g);
      o.start(t); o.stop(t+dur+0.2); o2.start(t); o2.stop(t+dur+0.2);
    }
  }
}

/* ---------- roaming: walking with occasional stops ---------- */
let roaming=true, roamTimer=null, walkAmp=0, locTimer=null;
const LOCS=[
  'SOHO-9 SECTOR','LOWER EAST GRID','WILLIAMSBIT BRIDGE','BYTE RIDGE, BK',
  'TIMES SQUARE Ø','HARLEM HEIGHTS.EXE','5TH AVE / DATA ROW','GRAND CENTRAL v2',
  'BUSHWICK CIRCUIT','DUMBO DOCKING BAY','CHINATOWN CACHE','EAST VILLAGE VOLTAGE',
  'THE HIGH LINE RAIL','WASHINGTON SQ LOOP','TRIBECA TRANSISTOR','LITTLE ITALY I/O',
];
let curLoc='', signTimer=null;
// build a fresh set of blades on the pole: sometimes 1, mostly 2–3, sometimes 4.
// even slots are readable street-name blades (facing -x), odd slots are the
// perpendicular cross blades (facing -y) with the usual unreadable marks.
function buildSignBlades(primary, force){
  const host=document.getElementById('gSignBlades');
  if(!host) return;
  const k = force ? force.k : pick([1,2,2,2,2,3,3,3,4,4]);          // count for this block
  const pool=LOCS.filter(l=>l!==primary).sort(()=>Math.random()-0.5);
  const zTop0=10.1, step=1.25;
  let out='', used=0;
  for(let i=0;i<k;i++){
    const zTop=zTop0-i*step, zBot=zTop-0.8;
    out+=seg([0.35,-4.7,zTop-0.05],[0.65,-4.5,zTop-0.05],'sgn');   // clamp band on the pole
    if(i%2===0){                                                   // readable blade, faces -x
      const nm = i===0 ? primary : (pool[used++]||primary);
      out+=poly([[-3.7,-4.6,zBot],[0.4,-4.6,zBot],[0.4,-4.6,zTop],[-3.7,-4.6,zTop]],'signblade');
      const [tx,ty]=iso(-3.45,-4.6,zBot+0.18);
      const long=nm.length*7.2>132;
      out+=`<text class="sgntxt" transform="translate(${tx.toFixed(1)} ${ty.toFixed(1)}) rotate(30)"`
          +(long?' textLength="132" lengthAdjust="spacingAndGlyphs"':'')
          +`>${nm}</text>`;
    } else {                                                       // cross blade, faces -y
      out+=poly([[0.6,-4.8,zBot],[0.6,-6.7,zBot],[0.6,-6.7,zTop],[0.6,-4.8,zTop]],'signblade');
      out+=seg([0.6,-5.2,zBot+0.32],[0.6,-6.3,zBot+0.32],'signmark');
    }
  }
  host.innerHTML=out;
}
function setLocation(name){
  curLoc=name;
  buildSignBlades(name);                        // vary the pole layout each new block
  const g=document.getElementById('gSign');
  g.classList.add('here');                      // fade in as they pass the sign
  clearTimeout(signTimer);
  signTimer=setTimeout(()=>g.classList.remove('here'), 12000);
}
function nextLocation(){ setLocation(pick(LOCS.filter(l=>l!==curLoc))); }
function scheduleRoam(){
  clearTimeout(roamTimer);
  const dur = roaming
    ? R(25000,110000)                                  // keep walking for a while
    : (Math.random()<0.25 ? R(60000,240000)            // rare long stop (tracks long)
                          : R(8000,30000));            // quick breather
  roamTimer=setTimeout(()=>{
    roaming=!roaming;
    if(roaming && playing){                            // walking again: a new spot comes up
      clearTimeout(locTimer);
      locTimer=setTimeout(()=>{ if(playing&&roaming) nextLocation(); }, R(6000,20000));

function showLiveRecording(on){

function doReverse(){
  reversing=true;

/* ---------- the mic droop gag ---------- */
const MIC_PERIOD=9;                 // seconds per sag-and-correct cycle
function micDroop(t,ph){            // 0 = horizontal (good), 1 = vertical (ice-cream grip)
  if(ph<0) return 0;                // this visitor holds it properly
  const p=((t/MIC_PERIOD+ph)%1+1)%1;
  return p<0.92 ? Math.pow(p/0.92,1.7) : Math.max(0,1-(p-0.92)/0.055);
}

/* ---------- scheduler ---------- */
function chordFor(deg){
  const d=((deg%7)+7)%7;
  let ks=track.g.ext?[0,2,4,6]:[0,2,4];
  if(track.g.ext9 && Math.random()<track.g.ext9) ks=[0,2,4,6,8];   // 9th voicings — that rnb lushness
  return ks.map(k=>{
    const idx=d+k;
    return MINOR[idx%7]+Math.floor(idx/7)*12;
  });
}
function wantsVisitorLead(v,sIdx){
  if(!v) return false;
  if(v.instr==='on the mic'){
    if(v.vocalMode==='sing') return sIdx%4===0 && Math.random()<0.45;
    if(v.vocalMode==='autotune') return sIdx%4===2 && Math.random()<0.5;
    return Math.random()<0.22;
  }
  return sIdx%2===0 && Math.random()<0.32;
}
function visitorLeadDur(v,s16){
  if(v.instr==='on the mic'){
    if(v.vocalMode==='sing') return s16*pick([4,6,8,10]);
    if(v.vocalMode==='autotune') return s16*pick([6,8,10,12]);   // long melismas — that's the point
    return s16*pick([0.45,0.6,0.8,1.1]);
  }
  if(v.instr==='on acoustic guitar'||v.instr==='on electric guitar') return s16*pick([0.8,1,1.4,2]);
  if(v.instr==='on flute'||v.instr==='on violin'||v.instr==='on e-violin') return s16*pick([3,4,6,8]);
  return s16*pick([2,2,3,4,6]);
}
function performerLabel(v){
  if(!v) return '';
  if(v.instr==='on the mic') return v.vocalMode==='sing'?'singing on the mic':v.vocalMode==='autotune'?'on the mic, drowned in autotune':'rapping on the mic';
  return v.instr;
}
function scheduleStep(sIdx,t){
  const g=track.g, spb=60/track.bpm, s16=spb/4;
  const tt=t+((sIdx%2===1)?track.swing*s16:0)+R(-0.003,0.003);   // human timing jitter
  const deg=track.prog[Math.floor(bar/2)%track.prog.length];
  const sect=sectAt(bar), nsect=sectAt(bar+1);
  const intro=sect.name==='intro', hookS=sect.name==='hook', outro=sect.name==='outro';
  const fillBar=nsect!==sect && !outro;                          // last bar before a section change

  /* drums — thinned in intro/outro, boosted in the hook */
  const drumsOn=!intro || bar>=sect.end-1;
  if(drumsOn && track.kick[sIdx] && !(outro&&Math.random()<0.4)){
    playKick(tt,R(0.85,1)); visQ.push({t:tt,type:'kick'});
  }
  if(drumsOn && track.snare[sIdx]){
    g.clap?playClap(tt):playSnare(tt,R(0.85,1));
    visQ.push({t:tt,type:'snare'});
  }
  if(g.ghost && drumsOn && !track.snare[sIdx] && sIdx%2===1 && Math.random()<g.ghost*0.35){
    playSnare(tt,R(0.15,0.3));                                   // ghost notes — the shuffle glue
  }
  /* fills into the next section */
  if(fillBar && sIdx>=12){
    if(sIdx===12 && Math.random()<0.5){                          // tom run down
      [12,13,14,15].forEach((s,i)=>{ if(s===sIdx||Math.random()<0.8)
        playTom(t+(s-sIdx)*s16,220-i*40,R(0.6,0.9)); });
    }else{
      playSnare(tt,R(0.4,0.7));                                  // snare roll
      if(sIdx===15) playSnare(tt+s16/2,R(0.5,0.8));
    }
  }
  if(fillBar && nsect.name==='hook' && sIdx===0) playRiser(tt,spb*4);
  if(hookS && bar===sect.start && sIdx===0) playImpact(tt);

  /* hats per genre */
  const hatVel=()=>R(0.7,1)*(hookS?1.1:1);
  if(g.hat==='eights'){
    if(drumsOn && sIdx%2===0 && Math.random()<track.hatP){
      playHat(tt,(sIdx%8===6&&Math.random()<0.4),hatVel()); visQ.push({t:tt,type:'hat'});
    }
  }else if(g.hat==='offbeat'){
    if(drumsOn){
      if(sIdx%4===2){playHat(tt,true,hatVel()); visQ.push({t:tt,type:'hat'});}
      else if(sIdx%2===0 && Math.random()<0.4) playHat(tt,false,hatVel());
    }
  }else if(g.hat==='rolls'){
    if(drumsOn && Math.random()<track.hatP){playHat(tt,false,hatVel()); if(sIdx%4===0)visQ.push({t:tt,type:'hat'});}
    if(drumsOn && sIdx%8===7 && Math.random()<0.4){playHat(tt+s16/3,false,0.6); playHat(tt+2*s16/3,false,0.7);}
    if(drumsOn && hookS && sIdx%4===3 && Math.random()<0.25){    // triplet stutter in the hook
      for(let i=0;i<3;i++) playHat(tt+i*s16/3,false,0.5+i*0.15);
    }
  }else if(g.hat==='fast'){
    if(drumsOn && Math.random()<track.hatP){
      playHat(tt,(sIdx%8===6&&Math.random()<0.3),hatVel());
      if(sIdx%4===2)visQ.push({t:tt,type:'hat'});
    }
  }
  if(g.cowbell && hookS && sIdx%8===4 && Math.random()<g.cowbell*3){
    playCowbell(tt); visQ.push({t:tt,type:'hat'});
  }
  /* bass per genre — resting in the intro */
  if(!intro && track.bassP[sIdx]){
    const bm=track.root-12+MINOR[deg%7];
    if(g.bass==='808')       play808(tt,bm-12,spb*R(0.8,1.6));
    else if(g.bass==='sub')  playSub(tt,bm-12,s16*R(2,4));
    else if(g.bass==='round')playRound(tt,bm,s16*R(2,3.5));
    else                     playBass(tt,bm,s16*R(1.5,3));
  }
  /* harmony per genre — pads carry the intro/outro */
  const notes=()=>chordFor(deg).map(iv=>track.root+iv);
  if(track.pad==='stab'){
    if(drumsOn && sIdx%4===2 && Math.random()<0.85){
      playStab(tt,notes());
      visQ.push({t:tt,type:'stab'});
    }
    if(intro && sIdx===0 && bar%2===0) playPad(tt,notes(),spb*8*0.95);
    if(sIdx===0 && bar%2===0){
      visQ.push({t:tt,type:'chord'});
      for(let i=0;i<8;i++) faderTarget[i]=R(0,1);
    }
  }else if(track.pad==='hpiano'){                                // classic house piano stabs
    if(drumsOn && (sIdx===2||sIdx===7||sIdx===10) && Math.random()<0.8){
      playPiano(tt,notes().map(m=>m+12),s16*3,0.13);
      if(sIdx===2) visQ.push({t:tt,type:'stab'});
    }
    if(sIdx===0 && bar%2===0){
      if(intro||outro) playPad(tt,notes(),spb*8*0.95);
      visQ.push({t:tt,type:'chord'});
      for(let i=0;i<8;i++) faderTarget[i]=R(0,1);
    }
  }else if(sIdx===0 && bar%2===0){
    const ns=notes();
    if(track.pad==='keys')       playKeys(tt,ns,spb*8*0.95);
    else if(track.pad==='epiano')playEPiano(tt,ns,spb*8*0.95);
    else if(track.pad==='pluck') ns.forEach((m,i)=>playPluck(tt+i*s16*0.5,m+12,spb*3));
    else                         playPad(tt,ns,spb*8*0.95);
    visQ.push({t:tt,type:'chord'});
    for(let i=0;i<8;i++) faderTarget[i]=R(0,1);
  }
  /* arpeggiator — hook energy layer */
  if(track.arpOn && hookS && sIdx%2===0 && Math.random()<0.85){
    const ns=chordFor(deg);
    const m=track.root+24+ns[(Math.floor(sIdx/2))%ns.length];
    if(track.pad==='pluck'||g.kit==='808') playPluck(tt,m,s16*1.8);
    else playPiano(tt,[m],s16*1.6,0.07);
  }
  if(sIdx===0){
    if(ariSing && (bar>=ariSingEnd || visitor)) stopAriSing();
    else if(!ariSing && !visitor && !track.ariMicUsed && bar===track.ariMicBar){
      track.ariMicUsed=true;
      startAriSing(tt);
    }
  }
  if(ariSing && !visitor && sIdx%2===1 && Math.random()<0.18){
    lastLeadIdxA=Math.max(0,Math.min(PENT.length*2-1, lastLeadIdxA+RI(-2,2)));
    const oct=Math.floor(lastLeadIdxA/PENT.length);
    const midi=track.root+12+oct*12+PENT[lastLeadIdxA%PENT.length];
    playLead(tt,midi,s16*pick([1,1.5,2,3]),'on the mic',0.75,'ari');
    visQ.push({t:tt,type:'alead'});
  }
  if(visitor && visitorPhase==='performing' && wantsVisitorLead(vis1,sIdx)){
    lastLeadIdx=Math.max(0,Math.min(PENT.length*2-1, lastLeadIdx+RI(-2,2)));
    const oct=Math.floor(lastLeadIdx/PENT.length);
    const midi=track.root+12+oct*12+PENT[lastLeadIdx%PENT.length];
    const dur=visitorLeadDur(vis1,s16);
    let vmul=1;
    if(vis1.instr==='on the mic'){
      const dp=micDroop(tt,vis1.micPh||0);
      vmul=(Math.random()<dp*0.55)?0:1-dp*0.8;   // drooped mic: notes vanish or come through faint
    }
    if(vmul>0){
      playLead(tt,midi,dur,vis1.instr,vmul,vis1.vocalMode);
      visQ.push({t:tt,type:'lead',v:1});
    }
  }
  if(visitor2 && visitorPhase==='performing' && wantsVisitorLead(vis2,sIdx)){
    lastLeadIdx2=Math.max(0,Math.min(PENT.length*2-1, lastLeadIdx2+RI(-2,2)));
    const oct=Math.floor(lastLeadIdx2/PENT.length);
    const midi=track.root+24+oct*12+PENT[lastLeadIdx2%PENT.length];
    const dur=visitorLeadDur(vis2,s16);
    let vmul=1;
    if(vis2.instr==='on the mic'){
      const dp=micDroop(tt,vis2.micPh||0);
      vmul=(Math.random()<dp*0.55)?0:1-dp*0.8;
    }
    if(vmul>0){
      playLead(tt,midi,dur,vis2.instr,vmul,vis2.vocalMode);
      visQ.push({t:tt,type:'lead',v:2});
    }
  }
}
function tick(){
  const resyncGap=Math.max(0.5,LOOKAHEAD*1.5);
  if(ctx.currentTime-nextT>resyncGap){  // woke up after sleep/throttle: resync
    nextT=ctx.currentTime+0.06;
    visQ.length=0;
  }
  while(nextT<ctx.currentTime+LOOKAHEAD){
    scheduleStep(step,nextT);
    nextT+=(60/track.bpm)/4;
    step=(step+1)%16;
    if(step===0){
      bar++;
      if(bar>=track.bars) crossToNext(null,nextT);   // land the crossfade on the scheduled time, not "now"
    }
  }
}
function crossToNext(forced,atTime){
  const t=atTime!=null?atTime:ctx.currentTime;
  master.gain.setValueAtTime(master.gain.value,t);
  master.gain.linearRampToValueAtTime(0.0001,t+0.7);
  master.gain.setValueAtTime(0.0001,t+0.9);
  master.gain.linearRampToValueAtTime(0.9,t+1.6);
  bar=0; step=0;
  newTrack(forced||((visitor&&visitorPhase==='performing')?track.genre:null));
  trackStart=t+0.9; nextT=t+0.9;
}

/* ---------- retro speech (SAM) ---------- */
const SPEAK_GENRE={'boom bap':'boom bap','trap':'trap','jerk':'jerk',
  'drum n bass':'drum and base','2000s rnb':'are and be','house':'house'};
const REQ_LINES=['can i get a X beat','yo, a X beat please','gimme some X','X please','you got X?'];
const ARI_LINES=['say less','okay okay','i got you','bet','one second'];
const ARI_VOICE={speed:92,pitch:60,mouth:190,throat:190};
const vVoice=(kind='neutral')=> kind==='femme' ? {pitch:RI(70,82),speed:RI(70,88),mouth:RI(130,188),throat:RI(122,186)} : kind==='masc' ? {pitch:RI(50,62),speed:RI(64,82),mouth:RI(104,178),throat:RI(98,160)} : {pitch:RI(56,72),speed:RI(66,86),mouth:RI(104,186),throat:RI(102,180)};
function speak(text,opts,vol,when){
  try{
    if(!window.SamJs||!ctx||!playing) return 0;
    const buf=new SamJs(opts).buf32(text);
    if(!buf||!buf.length) return 0;
    const ab=ctx.createBuffer(1,buf.length,22050);
    ab.getChannelData(0).set(buf);
    const src=ctx.createBufferSource(); src.buffer=ab;
    const g=ctx.createGain(); g.gain.value=vol||0.5;
    src.connect(g); g.connect(master);
    src.start(ctx.currentTime+(when||0));
    return ab.duration;
  }catch(e){return 0;}
}

/* ---------- visitor lifecycle ---------- */
let visitor2=false, visitorPhase='';
const short=i=>i.replace('on the ','').replace('on ','');
function setCypherLine(on){
  const el=document.getElementById('cypherline');
  if(!el) return;
  el.textContent='A cypher is forming';
  el.classList.toggle('on',!!on);
}
function leaveVisitors(vl){
  visitor=false; visitor2=false; visitorPhase='';
  gVis.classList.remove('here');
  gVis2.classList.remove('here');
  setCypherLine(false);
  vl.classList.remove('on');
  if(playing) scheduleVisitor();
}
function scheduleVisitor(){
  clearTimeout(visitorTimer);
  setCypherLine(false);
  visitorTimer=setTimeout(()=>{
    if(!playing) return;
    if(reversing){ scheduleVisitor(); return; }  // let the reverse shot finish first
    stopAriSing();
    visitor=true; visitorPhase='requesting';
    vis1=buildVisitor(gVis,pickInstr(),0);
    gVis.classList.add('here');
    visitor2=Math.random()<0.04;  // rare weird crossover moment
    if(visitor2){
      vis2=buildVisitor(gVis2,pickInstr(),-2.35);
      gVis2.classList.add('here');
    }
    const req=pick(Object.keys(GENRES).filter(k=>k!==track.genre));
    const vl=document.getElementById('visitorline');
    vl.textContent=(visitor2?'rare tag-team request: ':'visitor requests: ')+req+' →';
    vl.style.color=vis1.color;
    vl.classList.add('on');
    setCypherLine(visitor2);
    /* the request is spoken out loud, A.R.I. answers */
    const said=speak(pick(REQ_LINES).replace('X',SPEAK_GENRE[req]),vVoice(vis1.voiceKind),0.55);
    speak(pick(ARI_LINES),ARI_VOICE,0.5,said+0.35);
    /* the request lands, then A.R.I. flips the beat */
    visitorTimer=setTimeout(()=>{
      if(!playing) return;
      crossToNext(req);
      visitorTimer=setTimeout(()=>{
        if(!playing) return;
        visitorPhase='performing';
        vl.textContent=visitor2
          ? '+ rare duo '+performerLabel(vis1)+' × '+performerLabel(vis2)+' →'
          : '+ visitor '+performerLabel(vis1)+' →';
        setCypherLine(visitor2);
        visitorTimer=setTimeout(()=>leaveVisitors(vl), R(22000,46000));
      },1200);
    }, R(2500,4500));
  }, Math.random()<0.55 ? R(14000,45000) : R(90000,300000));
}

   VISUALS — driven by the audio schedule

const eqEls=[...Array(7)].map((_,i)=>document.getElementById('eq'+i));
const eqBase=[...Array(7)].map((_,i)=>{

const eqVal=new Array(7).fill(0.1);
const faderEls=[...Array(8)].map((_,i)=>document.getElementById('fader'+i));
const faderPos=new Array(8).fill(0.5), faderTarget=new Array(8).fill(0.5);
const gHead=document.getElementById('gHead');
const gWheel=document.getElementById('gWheel');
const gArmL=document.getElementById('gArmL');
const gAri=document.getElementById('gAri');
const gArmLup=document.getElementById('gArmLup');
const gArmR=document.getElementById('gArmR');
const gVis=document.getElementById('gVisitor');
const gVis2=document.getElementById('gVisitor2');
const sfxA=document.getElementById('sfxA'), sfxB=document.getElementById('sfxB');
const sfxC=document.getElementById('sfxC'), sfxD=document.getElementById('sfxD');

/* ---------- random visitor generator ---------- */
const VIS_DARK =['#ff5fd2','#ffb84d','#8dff96','#5fb0ff','#fff45f','#ff7a6b'];
const VIS_LIGHT=['#d6219c','#d97a12','#15913f','#2457d6','#b0890a','#d63a3a'];
const visPalette=()=>document.body.classList.contains('light')?VIS_LIGHT:VIS_DARK;
let vis1=null, vis2=null;
function buildVisitor(target,instr,dx){
  const col=pick(visPalette());
  const archetypes=[
    {kind:'cap',   voiceKind:'neutral', stance:0.00,  lean:0.00, shoulderRise:0.00, hemSkew:0.00},
    {kind:'masc',  voiceKind:'masc',    stance:0.05,  lean:0.06, shoulderRise:-0.04, hemSkew:0.03},
    {kind:'femme', voiceKind:'femme',   stance:-0.05, lean:-0.05, shoulderRise:0.05, hemSkew:-0.03}
  ];
  const arche=pick(archetypes);
  const h=R(0.86,1.14);         // height variation
  const bodyW=R(0.78,1.28);     // build: slender to broad, independent of height
  const fl=R(0.02,0.16);        // restrained hoodie flare
  const sway=R(-0.03,0.03);     // tiny per-visitor jitter so clones are avoided
  const stance=arche.stance+sway;
  const lean=arche.lean+sway*0.6;
  const shoulderRise=arche.shoulderRise;
  const hemSkew=arche.hemSkew+sway*0.5;
  const legT=2.72*h, bodT=5.34*h, headZ=6.08*h;
  const leftHandX=0.34+dx-lean*0.18, rightHandX=1.58+dx-lean*0.12;
  const headCX=0.95+dx+lean*0.28;
  let v='', notePos, micPh=0;
  const VS=1.28*R(0.97,1.03);   // visitor scale: ~90% of A.R.I.'s height
  const ax=0.95+dx, ay=-1.05;   // ground anchor to scale around
  const T=p=>[ax+(p[0]-ax)*VS*bodyW, ay+(p[1]-ay)*VS*bodyW, p[2]*VS];
  const vseg=(a,b,c)=>seg(T(a),T(b),c);
  const vpline=(a,c)=>pline(a.map(T),c);
  const vpoly=(a,c)=>poly(a.map(T),c);
  const vbez=(a,mm,b,c)=>bez(T(a),T(mm),T(b),c);
  const vcircY=(y,cx,cz,r,c)=>{const q=T([cx,y,cz]);return circY(q[1],q[0],q[2],r*VS,c);};
  const vcircTop=(cx,cy,z,r,c)=>{const q=T([cx,cy,z]);return circTop(q[0],q[1],q[2],r*VS,c);};
  /* coiled cable: plugged into the left input of the rig */
  v+=seg([1.2,1.3,4.22],[1.6,1.3,4.22],'p');                                       // jack
  v+=coil([1.6,1.3,4.22],T([0.55+dx-stance*0.18,-0.9,4.3*h]), dx<0?9:7, 6, 24,'p');
  v+=vseg([0.55+dx-stance*0.18,-0.9,4.3*h],[0.5+dx-stance*0.22,-0.98,4.88*h],'p');  // tail to hand
  const lpA=iso(...T([0.6+dx-stance*0.6,-1.05,legT])), lpB=iso(...T([1.3+dx+stance*0.6,-1.05,legT]));
  v+=`<g class="wlegA" data-px="${lpA[0].toFixed(1)}" data-py="${lpA[1].toFixed(1)}">`+vseg([0.55+dx-stance,-1.0,0],[0.6+dx-stance*0.6,-1.05,legT],'v')+'</g>';
  v+=`<g class="wlegB" data-px="${lpB[0].toFixed(1)}" data-py="${lpB[1].toFixed(1)}">`+vseg([1.35+dx+stance,-1.0,0],[1.3+dx+stance*0.6,-1.05,legT],'v')+'</g>';
  v+=vpoly([
    [0.25+dx,-1.1,legT],
    [1.65+dx,-1.1,legT],
    [1.65+fl+dx+lean,-1.1,bodT+shoulderRise],
    [0.25-fl+dx+lean*0.35+hemSkew,-1.1,bodT-shoulderRise*0.45]
  ],'v');
  v+=vcircY(-1.1,headCX,headZ+shoulderRise*0.25,.58,'v');

  if(arche.kind==='cap'){
    v+=vseg([0.34+dx+lean*0.18,-1.1,headZ+0.4],[1.06+dx+lean*0.18,-0.84,headZ+0.46],'v'); // cap top
    v+=vseg([0.54+dx+lean*0.16,-0.94,headZ+0.34],[1.02+dx+lean*0.16,-0.78,headZ+0.38],'v'); // cap brim
  }
  if(arche.kind==='masc'){
    v+=vbez([0.44+dx+lean*0.15,-1.1,headZ+0.24],[0.95+dx+lean*0.24,-1.1,headZ+0.72],[1.46+dx+lean*0.15,-1.1,headZ+0.24],'v');
    v+=vseg([0.48+dx+lean*0.14,-1.1,headZ+0.1],[0.48+dx+lean*0.14,-1.1,headZ-0.01],'v');
    v+=vseg([1.42+dx+lean*0.14,-1.1,headZ+0.1],[1.42+dx+lean*0.14,-1.1,headZ-0.01],'v');
  }
  if(arche.kind==='femme'){
    v+=vbez([0.4+dx+lean*0.12,-1.1,headZ+0.18],[0.95+dx+lean*0.28,-1.1,headZ+0.86],[1.5+dx+lean*0.12,-1.1,headZ+0.18],'v');
    v+=vbez([0.4+dx+lean*0.1,-1.1,headZ+0.05],[0.14+dx+lean*0.14,-1.1,headZ-0.5],[0.46+dx+lean*0.16,-1.1,headZ-1.02],'v');
    v+=vbez([1.5+dx+lean*0.1,-1.1,headZ+0.05],[1.76+dx+lean*0.14,-1.1,headZ-0.5],[1.44+dx+lean*0.16,-1.1,headZ-1.02],'v');
  }

  if(instr==='on acoustic guitar'||instr==='on electric guitar'){
    v+=vcircY(-1.0,1.25+dx,3.55*h,.45,'v');                                        // body
    if(instr==='on acoustic guitar') v+=vcircY(-1.0,1.25+dx,3.55*h,.15,'v');              // sound hole
    else{
      v+=vseg([1.05+dx,-1.0,3.45*h],[1.45+dx,-1.0,3.35*h],'v');                    // pickups
      v+=vseg([1.05+dx,-1.0,3.7*h],[1.45+dx,-1.0,3.6*h],'v');
    }
    v+=vseg([1.02+dx,-1.0,3.9*h],[0.08+dx,-1.0,5.15*h],'v');                       // neck
    v+=vseg([0.08+dx,-1.0,5.15*h],[-0.06+dx,-1.0,5.42*h],'v');                     // headstock
    v+=vpline([[rightHandX,-1.1,bodT-0.2],[1.5+dx,-0.85,3.85*h]],'v');             // strum arm
    v+=vpline([[leftHandX,-1.1,bodT-0.3],[0.32+dx,-0.9,4.85*h]],'v');              // fret arm
    notePos=T([1.35+dx,-0.9,4.35*h]);
  }else if(instr==='on flute'){
    v+=vseg([0.82+dx,-0.95,5.6*h],[1.95+dx,-0.72,5.45*h],'v');                     // flute
    v+=vseg([1.92+dx,-0.74,5.55*h],[1.98+dx,-0.7,5.36*h],'v');                     // end cap
    v+=vpline([[leftHandX,-1.1,bodT-0.3],[1.15+dx,-0.85,5.45*h]],'v');             // hand near
    v+=vpline([[rightHandX,-1.1,bodT-0.2],[1.6+dx,-0.8,5.4*h]],'v');               // hand far
    notePos=T([2.0+dx,-0.7,6.0*h]);
  }else if(instr==='on violin'||instr==='on e-violin'){
    const open=instr==='on e-violin'
      ?'<g style="color:'+pick(visPalette().filter(c=>c!==col))+'">':'';
    v+=open;
    if(instr==='on violin'){
      v+=vcircY(-0.95,0.5+dx,5.45*h,.32,'v');                                      // body
    }else{
      v+=vpline([[0.82+dx,-0.95,5.25*h],[0.28+dx,-0.95,5.3*h],[0.6+dx,-0.95,5.7*h],[0.82+dx,-0.95,5.55*h]],'v');
    }
    v+=vseg([0.3+dx,-0.95,5.6*h],[-0.5+dx,-0.95,6.12*h],'v');                      // neck
    v+=vseg([-0.5+dx,-0.95,6.12*h],[-0.64+dx,-0.95,6.0*h],'v');                    // scroll
    if(open) v+='</g>';
    v+=vseg([1.05+dx,-0.85,4.95*h],[0.12+dx,-0.85,5.95*h],'v');                    // bow
    v+=vpline([[rightHandX,-1.1,bodT-0.2],[0.95+dx,-0.82,5.05*h]],'v');            // bow arm
    v+=vpline([[leftHandX,-1.1,bodT-0.3],[-0.32+dx,-0.9,5.92*h]],'v');             // neck arm
    notePos=T([0.35+dx,-0.9,6.35*h]);
  }else if(instr==='on sax'){
    v+=vbez([0.98+dx,-0.86,5.65*h],[1.18+dx,-0.8,4.6*h],[1.32+dx,-0.8,4.15*h],'v');// tube down
    v+=vbez([1.32+dx,-0.8,4.15*h],[1.62+dx,-0.8,4.05*h],[1.68+dx,-0.8,4.5*h],'v'); // bell curve
    v+=vcircY(-0.8,1.68+dx,4.62*h,.2,'v');                                          // bell
    v+=vpline([[leftHandX,-1.1,bodT-0.3],[1.05+dx,-0.85,4.95*h]],'v');             // hand high
    v+=vpline([[rightHandX,-1.1,bodT-0.2],[1.28+dx,-0.85,4.45*h]],'v');            // hand low
    notePos=T([1.7+dx,-0.75,5.15*h]);
  }else{ // on the mic — held properly horizontal… until it droops
    v+=vpline([[leftHandX,-1.1,bodT-0.3],[0.9+dx+lean*0.16,-0.55,5.55*h]],'v');    // arm
    const hp=iso(...T([0.9+dx+lean*0.16,-0.55,5.55*h]));                            // hand pivot (screen px)
    micPh=Math.random()<0.22 ? Math.random() : -1;                                  // -1 = holds it properly
    const mL=18*VS, mA=-38*Math.PI/180;                                             // horizontal-ish, aimed at the mouth
    const mtx=hp[0]+Math.cos(mA)*mL, mty=hp[1]+Math.sin(mA)*mL;
    v+='<g class="gMicHold" data-px="'+hp[0].toFixed(1)+'" data-py="'+hp[1].toFixed(1)+'" data-ph="'+micPh.toFixed(3)+'">'
      +'<line class="v" x1="'+hp[0].toFixed(1)+'" y1="'+hp[1].toFixed(1)+'" x2="'+mtx.toFixed(1)+'" y2="'+mty.toFixed(1)+'"/>'
      +'<circle class="v" cx="'+mtx.toFixed(1)+'" cy="'+mty.toFixed(1)+'" r="'+(4.4*VS).toFixed(1)+'"/>'
      +'</g>';
    notePos=T([0.97+dx+lean*0.18,-0.48,6.9*h]);
  }
  target.innerHTML=v;
  target.style.color=col;
  const r=Math.random();
  const vocalMode=instr==='on the mic' ? (r<0.35?'sing':r<0.72?'rap':'autotune') : '';
  return {instr, color:col, notePos, voiceKind:arche.voiceKind, archetype:arche.kind, micPh, vocalMode};
}
vis1=buildVisitor(gVis,'on the mic',0);              // pre-built so the viewBox
vis2=buildVisitor(gVis2,'on acoustic guitar',-2.35); // reserves space for a duo
const world=document.getElementById('world');
let kickE=0,snareE=0,hatE=0;
const reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;

const SPK=[[3.6,3.45,3.9],[10.0,3.45,3.9],[10.35,-2.6,7.9],[10.45,-2.6,5.6]];
const keyEls=[...Array(9)].map((_,i)=>document.getElementById('key'+i));
const gWheelSpin=document.getElementById('gWheelSpin');
const WC=iso(3.3,1.2,ZT+0.02);                 // wheel center (screen)
function flashChord(){
  const i=RI(0,4);
  [i,i+2,i+4].forEach(k=>{
    const el=keyEls[k]; if(!el) return;
    el.classList.add('on');
    setTimeout(()=>el.classList.remove('on'),200+RI(0,120));
  });
}
function spawnNote(pos,cls,color){
  if(reduceMotion) return;
  const [x,y]=iso(...(pos||[0.97,-0.48,6.9]));
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x+R(-8,10)); t.setAttribute('y',y);
  t.setAttribute('class','note '+(cls||'')+' go');
  if(color) t.style.fill=color;
  t.textContent=pick(['♪','♫','♩']);
  world.appendChild(t);
  setTimeout(()=>t.remove(),2300);
}
function flashPad(){
  const p=document.getElementById('pad'+RI(0,11));
  if(!p) return;
  p.style.fill='rgba(167,139,255,.55)';
  setTimeout(()=>p.style.fill='rgba(167,139,255,0)',120);
}

function frame(){
  requestAnimationFrame(frame);
  if(!ctx) return;
  const now=ctx.currentTime;
  while(visQ.length && visQ[0].t<=now){
    const e=visQ.shift();
    if(e.type==='kick'){kickE=1; eqVal[0]=1; eqVal[1]=0.85;
      if(Math.random()<0.16) spawnNote(pick(SPK),'sp');}
    if(e.type==='snare'){snareE=1; eqVal[2]=0.9; eqVal[3]=1; eqVal[4]=0.8; flashPad();}
    if(e.type==='hat'){hatE=1; eqVal[5]=Math.max(eqVal[5],0.7); eqVal[6]=Math.max(eqVal[6],0.85);}
    if(e.type==='chord'){eqVal.forEach((v,i)=>eqVal[i]=Math.max(v,0.6));
      flashChord();
      if(Math.random()<0.5) spawnNote(pick(SPK),'sp');}
    if(e.type==='stab'){flashChord();}
    if(e.type==='lead'){const vv=(e.v===2)?vis2:vis1; spawnNote(vv.notePos,null,vv.color); eqVal[4]=1;}
    if(e.type==='alead'){
      spawnNote([7.6,-0.56,10.1],null,getComputedStyle(document.body).getPropertyValue('--cyan').trim());
      eqVal[4]=1;
    }
  }
  kickE*=0.86; snareE*=0.85; hatE*=0.8;
  sfxA.style.opacity=sfxB.style.opacity=Math.min(1,kickE*1.3).toFixed(2);
  sfxC.style.opacity=Math.min(1,hatE*1.1).toFixed(2);
  sfxD.style.opacity=Math.min(1,snareE*1.2).toFixed(2);
  /* walk cycle: slow amble, big committed swing, bouncing body */
  walkAmp+=((roaming&&playing?1:0)-walkAmp)*0.05;
  const wp=now*Math.PI*0.55;
  const bob=Math.abs(Math.sin(wp))*2.6*walkAmp;        // body rises mid-step
  if(!reduceMotion && walkAmp>0.005){
    const th=0.38*Math.sin(wp)*walkAmp;                // ±22° around the hinge axle
    poseLeg(legA3, th, Math.max(0,Math.cos(wp))*2.2*walkAmp, bob);
    poseLeg(legB3,-th, Math.max(0,-Math.cos(wp))*2.2*walkAmp, bob);
    [[gVis,visitor,0.9],[gVis2,visitor2,2.1]].forEach(([g,on,ph])=>{
      if(!on) return;
      const eA=g.querySelector('.wlegA'), eB=g.querySelector('.wlegB');
      if(!eA) return;
      const bv=(Math.abs(Math.sin(wp+ph))*2.2*walkAmp).toFixed(1);
      const a=(13*Math.sin(wp+ph)*walkAmp).toFixed(2);
      eA.setAttribute('transform',`translate(0 ${bv}) rotate(${a} ${eA.dataset.px} ${eA.dataset.py})`);
      eB.setAttribute('transform',`translate(0 ${bv}) rotate(${-a} ${eB.dataset.px} ${eB.dataset.py})`);
    });
  }
  if(!reduceMotion){
    gAri.style.transform=`translateY(${(-bob).toFixed(1)}px)`;
    gHead.style.transform=`translateY(${(kickE*4.2).toFixed(1)}px)`;
    gWheel.style.transform=`translateY(${(kickE*1.4).toFixed(1)}px)`;
    gArmL.style.transform=`translateY(${(kickE*2).toFixed(1)}px)`;
    gArmLup.style.transform=`translateY(${(kickE*3.4).toFixed(1)}px)`;
    gArmR.style.transform=`translateY(${(snareE*2.4).toFixed(1)}px)`;
    if(visitor) gVis.style.transform=`translateY(${(Math.sin(now*2.2)*2.4-Math.abs(Math.sin(wp+0.9))*2.2*walkAmp).toFixed(1)}px)`;
    if(visitor2) gVis2.style.transform=`translateY(${(Math.sin(now*2.2+1.7)*2.4-Math.abs(Math.sin(wp+2.1))*2.2*walkAmp).toFixed(1)}px)`;
    document.querySelectorAll('.gMicHold').forEach(el=>{
      const ph=+el.dataset.ph;
      if(ph<0) return;                            // holds it properly — no animation
      const a=-52*micDroop(now,ph);               // sag toward vertical, snap back
      el.setAttribute('transform','rotate('+a.toFixed(1)+' '+el.dataset.px+' '+el.dataset.py+')');
    });
  }
  if(!reduceMotion && playing && track && gWheelSpin){
    const phi=now*(track.bpm/60)*Math.PI*0.5;          // quarter turn per beat
    const cph=Math.cos(phi), sph=Math.sin(phi);
    const ma=cph, mb=(IB/IA)*sph, mc=-(IA/IB)*sph, md=cph;
    const me=WC[0]-(ma*WC[0]+mc*WC[1]);
    const mf=WC[1]-(mb*WC[0]+md*WC[1]);
    gWheelSpin.setAttribute('transform',
      `matrix(${ma.toFixed(4)} ${mb.toFixed(4)} ${mc.toFixed(4)} ${md.toFixed(4)} ${me.toFixed(1)} ${mf.toFixed(1)})`);
  }
  for(let i=0;i<7;i++){
    eqVal[i]=Math.max(0.08,eqVal[i]*0.9);
    eqEls[i].setAttribute('y2',(eqBase[i].b-eqVal[i]*44).toFixed(1));
  }
  for(let i=0;i<8;i++){
    faderPos[i]+=(faderTarget[i]-faderPos[i])*0.03;
    faderEls[i].style.transform=`translate(${(-faderPos[i]*IA*0.28).toFixed(1)}px,${(-faderPos[i]*IB*0.28).toFixed(1)}px)`;
  }
  if(playing && track) updateMeta(Math.max(0,now-trackStart));
}
requestAnimationFrame(frame);

   TRANSPORT
   ============================================================ */
const hint=document.getElementById('hint');
const btn=document.getElementById('playbtn');
const pbicon=document.getElementById('pbicon');
const info=document.getElementById('trackinfo');

function start(){
  if(!ctx) initAudio();
  ctx.resume();
  if(bgAudioEl) bgAudioEl.play().catch(()=>{});   // must fire inside this click for iOS to grant it
  if(!track) newTrack();
  playing=true; started=true;
  hint.style.display='none';
  btn.style.display='flex';
  info.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    btn.classList.add('show');
    setTimeout(()=>info.classList.add('show'),220);
  }));
  const vl=document.getElementById('visitorline');
  vl.textContent='A.R.I. is tuning into the street signal…';
  vl.style.color='var(--cyan-dim)';
  vl.classList.add('on');
  setCypherLine(false);
  setTimeout(()=>{ if(!visitor) vl.classList.remove('on'); },4200);
  pbicon.setAttribute('d','M8 5 v14 M16 5 v14');
  step=0; bar=0;
  nextT=ctx.currentTime+0.08; trackStart=nextT;
  timerId=setInterval(tick,25);
  scheduleVisitor();
  scheduleReverse();
  roaming=true; scheduleRoam();
  setLocation(pick(LOCS));
  grabWakeLock();
  updateMediaSession();
  if('mediaSession' in navigator) navigator.mediaSession.playbackState='playing';
}
function stop(){
  playing=false;
  clearInterval(timerId);
  clearTimeout(visitorTimer);
  clearTimeout(revTimer);
  clearTimeout(roamTimer);
  clearTimeout(locTimer);
  ctx.suspend();
  if(bgAudioEl) bgAudioEl.pause();
  dropWakeLock();
  pbicon.setAttribute('d','M8 5 L18 12 L8 19 Z');
  if('mediaSession' in navigator) navigator.mediaSession.playbackState='paused';
}
function resume(){
  playing=true;
  ctx.resume();
  if(bgAudioEl) bgAudioEl.play().catch(()=>{});
  nextT=Math.max(nextT,ctx.currentTime+0.08);
  timerId=setInterval(tick,25);
  scheduleVisitor();
  scheduleReverse();
  scheduleRoam();
  grabWakeLock();
  pbicon.setAttribute('d','M8 5 v14 M16 5 v14');
  if('mediaSession' in navigator) navigator.mediaSession.playbackState='playing';
}
document.getElementById('stage').addEventListener('click',()=>{ if(!started) start(); });
btn.addEventListener('click',e=>{
  e.stopPropagation();
  if(!started){start();return;}
  playing?stop():resume();
});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault(); started?(playing?stop():resume()):start();}
});

/* ---------- keep the screen awake & recover audio ---------- */
let wakeLock=null;
async function grabWakeLock(){
  try{
    if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen');
  }catch(e){/* not available or denied — fine, no screen while backgrounded anyway */}
}
function dropWakeLock(){
  if(wakeLock){wakeLock.release().catch(()=>{}); wakeLock=null;}
}
async function recoverAudio(){
  if(!ctx||!started||!playing) return;
  try{await ctx.resume();}catch(e){}
  if(bgAudioEl && bgAudioEl.paused) bgAudioEl.play().catch(()=>{});
  // no forced nextT rewrite here: if the background lookahead kept nextT correctly
  // ahead of real time, yanking it back to "now" would desync it from bar/step and
  // double-schedule notes. tick()'s own staleness check (see resyncGap) already
  // handles the case where we genuinely fell silent for too long.
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){
    // iOS/Android throttle background JS timers hard. A 25ms lookahead can't survive
    // that — the scheduler starves and you hear exactly the stutter you're describing.
    // Widen the window to several seconds of pre-scheduled Web Audio events (their
    // start/stop times are sample-accurate and run on the audio thread regardless of
    // what the main thread is doing) and fill it right now, before throttling kicks in.
    if(playing){ LOOKAHEAD=8; tick(); }
  }else{
    LOOKAHEAD=0.12;                       // back to tight, responsive scheduling + visual sync
    visQ.length=0;                        // drop the stale backlog — nobody was watching anyway
    if(playing){ grabWakeLock(); recoverAudio(); }
  }
});
window.addEventListener('focus',()=>{if(playing)recoverAudio();});
// iOS can leave the context 'interrupted'; a touch anywhere revives it
document.addEventListener('touchstart',()=>{
  if(ctx&&playing&&ctx.state!=='running') recoverAudio();
},{passive:true});

/* ---------- Media Session: lock-screen controls + the background-audio "permit" ----------
   Registering a session and keeping a real <audio> element audibly playing (see initAudio)
   is what tells iOS/Android this page is legitimate background media, not just a tab doing
   silent work. It's a meaningful improvement, not a guarantee — see README for the caveats. */
function updateMediaSession(){
  if(!('mediaSession' in navigator) || !track) return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title:'“'+track.name+'”',
    artist:'A.R.I. — live from the grid',
    album:track.genre+' · '+track.keyName+' · '+track.bpm+' bpm',
    artwork: track.artURL ? [{src:track.artURL, sizes:'512x512', type:'image/png'}] : [],
  });
}
if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',()=>{ started?resume():start(); });
  navigator.mediaSession.setActionHandler('pause',()=>{ if(playing) stop(); });
}

/* ---------- theme: auto / light / dark ---------- */
const ICONS={
  light:'<path d="M12 4 v-2 M12 22 v-2 M4 12 h-2 M22 12 h-2 M6.3 6.3 L4.9 4.9 M19.1 19.1 L17.7 17.7 M6.3 17.7 L4.9 19.1 M19.1 4.9 L17.7 6.3 M12 8 a4 4 0 1 0 0 8 a4 4 0 1 0 0 -8"/>',
  dark:'<path d="M20 13.5 A8 8 0 1 1 10.5 4 A6.5 6.5 0 0 0 20 13.5 Z"/>',
  auto:'<circle cx="12" cy="12" r="8"/><path class="fillhalf" d="M12 4 A8 8 0 0 1 12 20 Z"/>',
};
const themeBtn=document.getElementById('themebtn');
const thicon=document.getElementById('thicon');
const sysLight=matchMedia('(prefers-color-scheme: light)');
let themeMode='auto';                          // 'auto' | 'light' | 'dark'

function applyTheme(){
  const light = themeMode==='light' || (themeMode==='auto' && sysLight.matches);
  document.body.classList.toggle('light',light);
  thicon.innerHTML=ICONS[themeMode];
  themeBtn.classList.toggle('auto',themeMode==='auto');
  if(!visitor){ // repaint idle (invisible) visitors in the current palette
    vis1=buildVisitor(gVis,'on the mic',0);
    vis2=buildVisitor(gVis2,'on acoustic guitar',-2.35);
  }
}
sysLight.addEventListener('change',()=>{ if(themeMode==='auto') applyTheme(); });
themeBtn.addEventListener('click',e=>{
  e.stopPropagation();
  themeMode = themeMode==='auto' ? 'light' : themeMode==='light' ? 'dark' : 'auto';
  applyTheme();
});
applyTheme();

/* ---------- PWA: service worker registration ---------- */
if('serviceWorker' in navigator && location.protocol==='https:'){
  addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
